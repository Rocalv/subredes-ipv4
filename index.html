<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Subredes</title>
    <style>
        :root {
            --net-color: #3498db;
            --host-color: #2ecc71;
            --bg: #f4f7f6;
            --card: #fff;
            --text: #333;
            --muted: #7f8c8d;
            --dark: #2c3e50;
            --danger: #e74c3c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { height: 100%; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
        }

        /* Container ocupa todo el ancho disponible menos el padding del body */
        .container {
            background: var(--card);
            padding: clamp(16px, 3vw, 28px);
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
        }

        h2 {
            text-align: center;
            color: var(--dark);
            margin-bottom: 20px;
            font-size: clamp(1.1em, 3vw, 1.5em);
        }

        /* ── Controls: fila IP + Máscara, luego slider full-width ── */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        /* Fila superior: IP y Máscara lado a lado */
        .controls-row {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            min-width: 0;
            flex: 1;          /* IP y Máscara se reparten el espacio igualmente */
        }

        /* El grupo slider siempre full-width, ya está fuera del controls-row */

        label {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.88em;
            white-space: nowrap;
        }

        input[type="text"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
            width: 100%;
            min-width: 0;
        }

        /* Máscara: decimal crece, CIDR ancho fijo */
        .mask-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .mask-wrapper input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
            min-width: 0;
        }

        .mask-wrapper input:first-of-type {
            flex: 1 1 auto;
        }

        .mask-wrapper input:last-of-type {
            flex: 0 0 64px;
            text-align: center;
        }

        .mask-sep {
            font-weight: bold;
            color: var(--muted);
            font-size: 1.1em;
            flex-shrink: 0;
        }

        /* En móvil, IP y Máscara apilan verticalmente */
        @media (max-width: 500px) {
            .controls-row {
                flex-direction: column;
            }
        }

        .pattern-network {
            color: var(--net-color);
            font-weight: 700;
        }

        .pattern-host {
            color: var(--host-color);
            font-weight: 700;
        }

        /* Slider con counter */
        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 5px;
        }

        .slider-counter {
            font-size: 1em;
            font-weight: bold;
            color: var(--danger);
            font-variant-numeric: tabular-nums;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--danger);
        }

        /* ── Results block ── */
        .results-block {
            background: var(--dark);
            color: white;
            border-radius: 8px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .results-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 10px 16px;
            font-size: clamp(0.85em, 2.2vw, 1.1em);
            gap: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .results-row:last-child { border-bottom: none; }

        .results-row.active-row {
            background: rgba(255,255,255,0.1);
        }

        .results-label {
            font-size: 0.78em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.7;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .results-value {
            font-family: monospace;
            font-size: 1.15em;
            letter-spacing: 1px;
            word-break: break-all;
            text-align: right;
        }

        /* ── Toggle ── */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
            background: #ecf0f1;
            padding: 12px;
            border-radius: 8px;
            flex-wrap: wrap;
        }

        .toggle-label {
            font-weight: bold;
            color: var(--muted);
            transition: color 0.3s;
            font-size: clamp(0.75em, 2vw, 0.9em);
            text-align: center;
            cursor: pointer;
        }

        .toggle-label.active-red       { color: var(--net-color); }
        .toggle-label.active-broadcast { color: var(--host-color); }

        .toggle-hint {
            font-size: 0.72em;
            color: var(--muted);
            text-align: center;
            margin-top: -18px;
            margin-bottom: 18px;
            font-style: italic;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 56px;
            height: 30px;
            flex-shrink: 0;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider-sw {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: var(--net-color);
            transition: .4s;
            border-radius: 30px;
        }

        .slider-sw:before {
            position: absolute;
            content: "";
            height: 22px; width: 22px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider-sw               { background-color: var(--host-color); }
        input:checked + .slider-sw:before        { transform: translateX(26px); }

        /* ── Octets ── */
        .octets-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: clamp(8px, 1.2vw, 16px);
            margin-bottom: 20px;
            row-gap: 16px;
            width: 100%;
            box-sizing: border-box;
        }

        .octet {
            display: flex;
            flex-direction: row;
            align-items: center;
            width: 100%;
            min-width: 0;
            padding: 10px 14px;
            box-sizing: border-box;
            background: rgba(0,0,0,0.02);
            border-radius: 8px;
            gap: 16px;
        }

        .octet-bits-area {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }

        .octet-title {
            font-weight: 700;
            margin: 0 0 8px 0;
            color: var(--dark);
            font-size: clamp(0.9em, 1.6vw, 1em);
        }

        .bits-row, .weight-row {
            display: flex;
            gap: clamp(4px, 1vw, 8px);
            justify-content: flex-start;
            align-items: center;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 2px;
        }

        .weight-row {
            margin-top: 4px;
            padding-left: 0;
        }

        .bit {
            width: clamp(28px, 4.2vw, 40px);
            height: clamp(28px, 4.2vw, 40px);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            font-family: monospace;
            font-weight: 700;
            font-size: clamp(0.85em, 2vw, 1.1em);
            color: #fff;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .weight {
            width: clamp(28px, 4.2vw, 40px);
            text-align: center;
            font-size: clamp(0.45em, 1.2vw, 0.62em);
            color: var(--muted);
            flex-shrink: 0;
        }

        .bit.network { background-color: var(--net-color); }
        .bit.host    { background-color: var(--host-color); }

        /* Suma del octeto */
        .octet-sum {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 54px;
            background: var(--dark);
            color: white;
            border-radius: 8px;
            padding: 8px 10px;
            flex-shrink: 0;
        }

        .octet-sum-label {
            font-size: 0.6em;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.6;
            margin-bottom: 2px;
        }

        .octet-sum-value {
            font-family: monospace;
            font-size: 1.3em;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* ── Validation hint ── */
        .hint {
            font-size: 0.78em;
            color: var(--danger);
            margin-top: 3px;
            min-height: 1em;
        }

        input.invalid {
            border-color: var(--danger) !important;
            outline: none;
            box-shadow: 0 0 0 2px rgba(231,76,60,0.2);
        }

        /* ── Toast popup ── */
        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: #c0392b;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.92em;
            font-weight: 600;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            z-index: 9999;
            transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.35s;
            opacity: 0;
            max-width: 90vw;
            text-align: center;
            pointer-events: none;
        }
        #toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 480px) {
            .octets-container {
                flex-direction: column;
            }
            .octet {
                width: 100%;
            }
            .bits-row {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
        }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="container">
    <h2>Subredes IPv4</h2>

    <div class="controls">

        <div class="controls-row">
            <div class="input-group">
                <label>Dirección IP:</label>
                <input type="text" id="ipInput" value="" placeholder="ej. 192.168.1.0">
                <span class="hint" id="ipHint"></span>
                <div id="classInfo" style="margin-top:6px; font-size:0.82em; color:var(--muted); min-height:1.2em; line-height:1.5;"></div>
            </div>

            <div class="input-group">
                <label>Máscara:</label>
                <div class="mask-wrapper">
                    <input type="text" id="decimalMaskInput" value="" placeholder="255.x.x.x"
                           title="Máscara decimal: ej. 255.255.254.0">
                    <span class="mask-sep">·</span>
                    <input type="text" id="cidrInput" value="" placeholder="/24"
                           title="Notación CIDR: número entre 8 y 30">
                </div>
                <span class="hint" id="maskHint"></span>
            </div>
        </div>

        <div id="subnetSliderGroup" style="display:none">
            <div class="slider-header">
                <label style="margin:0">Seleccionar Subred:</label>
                <span class="slider-counter" id="subnetCounter">0 / 0</span>
            </div>
            <input type="range" id="subnetSlider" value="0" min="0" max="0">
        </div>

    </div>

    <!-- Bloque de resultados siempre visible -->
    <div class="results-block">
        <div class="results-row" id="rowRed">
            <span class="results-label">Dirección de Red</span>
            <span class="results-value" id="ipRed">—</span>
        </div>
        <div class="results-row" id="rowBroadcast">
            <span class="results-label">Dirección de Broadcast</span>
            <span class="results-value" id="ipBroadcast">—</span>
        </div>
        <div class="results-row" id="rowRango">
            <span class="results-label">Rango válido</span>
            <span class="results-value" id="ipRango">—</span>
        </div>      
    </div>

    <!-- Toggle: solo cambia qué octetos se visualizan -->
    <div class="toggle-container">
        <span id="labelRed" class="toggle-label active-red">Dirección de Red</span>
        <label class="switch">
            <input type="checkbox" id="broadcastToggle">
            <span class="slider-sw"></span>
        </label>
        <span id="labelBroadcast" class="toggle-label">Dirección de Broadcast</span>
    </div>

    <div class="octets-container" id="visualizer"></div>

</div>


<script>
    let isBroadcastMode = false;
    let updatingMask = false;
    const weights = [128, 64, 32, 16, 8, 4, 2, 1];

    // --- FUNCIONES UTILITARIAS ---

    function ipToBinaryString(ip) {
        const octets = ip.split('.');
        if (octets.length !== 4) return "00000000000000000000000000000000";
        return octets.map(octet => {
            const num = parseInt(octet, 10);
            return (isNaN(num) ? 0 : num).toString(2).padStart(8, '0');
        }).join('');
    }

    function binaryToIp(bin) {
        let parts = [];
        for (let i = 0; i < 4; i++) parts.push(parseInt(bin.substring(i*8, (i+1)*8), 2));
        return parts.join('.');
    }

    function getDefaultCidr(ip) {
        const firstOctet = parseInt(ip.split('.')[0], 10);
        if (isNaN(firstOctet)) return 24;
        if (firstOctet <= 126) return 8;
        if (firstOctet <= 191) return 16;
        return 24;
    }

    function cidrToDecimal(cidr) {
        const bin = "1".repeat(cidr) + "0".repeat(32 - cidr);
        return [
            parseInt(bin.substring(0, 8), 2),
            parseInt(bin.substring(8, 16), 2),
            parseInt(bin.substring(16, 24), 2),
            parseInt(bin.substring(24, 32), 2)
        ].join('.');
    }

    function decimalToCidr(dec) {
        const binStr = ipToBinaryString(dec);
        return binStr.indexOf('0') !== -1 ? binStr.indexOf('0') : 32;
    }

    function colorClassPattern(pattern) {
        return pattern.split('').map(char => {
            if (char === 'N') return `<span class="pattern-network">${char}</span>`;
            if (char === 'H') return `<span class="pattern-host">${char}</span>`;
            return char;
        }).join('');
    }

    function getClassInfo(ip) {
        const firstOctet = parseInt(ip.split('.')[0], 10);
        if (isNaN(firstOctet) || ip.split('.').length < 2) return null;
        if (firstOctet <= 126)  return { clase: 'A', patron: 'N.H.H.H', defaultMask: '255.0.0.0',     cidr: 8  };
        if (firstOctet === 127) return { clase: '— (Loopback)', patron: '—', defaultMask: '255.0.0.0', cidr: 8  };
        if (firstOctet <= 191)  return { clase: 'B', patron: 'N.N.H.H', defaultMask: '255.255.0.0',   cidr: 16 };
        if (firstOctet <= 223)  return { clase: 'C', patron: 'N.N.N.H', defaultMask: '255.255.255.0', cidr: 24 };
        if (firstOctet <= 239)  return { clase: 'D (Multicast)', patron: '—', defaultMask: '—',        cidr: null };
        return                         { clase: 'E (Reservada)',  patron: '—', defaultMask: '—',        cidr: null };
    }

    // Máscara máxima: /30 garantiza al menos 2 bits de host (dir. red + broadcast)
    const MAX_CIDR = 30;

    function isValidIp(ip) {
        const parts = ip.split('.');
        if (parts.length !== 4) return false;
        return parts.every(p => {
            if (p === '' || isNaN(p)) return false;
            const n = parseInt(p, 10);
            return n >= 0 && n <= 255 && String(n) === p.trim();
        });
    }

    function isValidDecimalMask(mask) {
        // Debe ser IPv4 válida y tener bits contiguos (potencia de máscara válida)
        if (!isValidIp(mask)) return false;
        const bin = ipToBinaryString(mask);
        // Todos los 1s deben ir antes que todos los 0s
        return /^1*0*$/.test(bin);
    }

    function setFieldError(inputEl, hintEl, msg) {
        inputEl.classList.add('invalid');
        if (hintEl) hintEl.textContent = msg;
    }

    function clearFieldError(inputEl, hintEl) {
        inputEl.classList.remove('invalid');
        if (hintEl) hintEl.textContent = '';
    }

    let toastTimer = null;
    function showToast(msg) {
        const t = document.getElementById('toast');
        if (!t) return;
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
    }

    // --- LÓGICA PRINCIPAL ---

    function updateVisualizer(sourceEvent = 'init') {
        const ipInput = document.getElementById('ipInput');
        const cidrInput = document.getElementById('cidrInput');
        const slider = document.getElementById('subnetSlider');
        const broadcastToggle = document.getElementById('broadcastToggle');
        const sliderGroup = document.getElementById('subnetSliderGroup');
        const maskHint = document.getElementById('maskHint');

        isBroadcastMode = broadcastToggle ? broadcastToggle.checked : false;

        let ipStr = ipInput.value.trim();
        let rawCidr = parseInt(cidrInput.value.replace(/^\//, ''), 10);
        if (isNaN(rawCidr)) rawCidr = getDefaultCidr(ipStr);

        // Salir si la IP no es válida todavía
        if (ipStr && !isValidIp(ipStr)) return;

        // 1. Clase y CIDR por defecto
        const defaultCidr = getDefaultCidr(ipStr);

        // Aplicar límite /30 y advertir si se excede
        const excedsMax = rawCidr > MAX_CIDR;
        const cidr = Math.min(rawCidr, MAX_CIDR);

        if (excedsMax) {
            showToast(`⚠ /${rawCidr} excede el máximo permitido. El máximo posible son ${MAX_CIDR - getDefaultCidr(ipStr)} bits prestados (/${MAX_CIDR}). Se ajusta automáticamente.`);
            updatingMask = true;
            cidrInput.value = '/' + MAX_CIDR;
            document.getElementById('decimalMaskInput').value = cidrToDecimal(MAX_CIDR);
            updatingMask = false;
        }

        // n = bits prestados para subredes, h = bits de host
        const borrowedBits = Math.max(0, cidr - defaultCidr);  // n
        const hostBits = 32 - cidr;                             // h

        // Subredes = 2^n  (el slider recorre 0 … 2^n − 1)
        const numSubnets = borrowedBits > 0 ? Math.pow(2, borrowedBits) : 0;
        // Hosts por subred = 2^h − 2
        const hostsPerSubnet = Math.max(0, Math.pow(2, hostBits) - 2);
        const maxSubnetIndex = numSubnets > 0 ? numSubnets - 1 : 0;

        // Info de clase + resumen de subredes/hosts
        const classInfo = getClassInfo(ipStr);
        const classInfoEl = document.getElementById('classInfo');
        if (classInfoEl) {
            let html = '';
            if (classInfo && classInfo.cidr) {
                html += `Clase: <strong>${classInfo.clase}</strong> (${colorClassPattern(classInfo.patron)})<br>Máscara por defecto: <strong>${classInfo.defaultMask}</strong> /${classInfo.cidr}`;
            } else if (classInfo) {
                html += `Clase <strong>${classInfo.clase}</strong>`;
            }
            if (borrowedBits > 0) {
                html += `<br>Subredes: <strong>${numSubnets}</strong> (2<sup>${borrowedBits}</sup>)&nbsp;&nbsp;·&nbsp;&nbsp;Hosts por subred: <strong>${hostsPerSubnet}</strong> (2<sup>${hostBits}</sup> − 2)`;
            }
            classInfoEl.innerHTML = html;
        }

        // Slider
        if (sliderGroup) sliderGroup.style.display = borrowedBits > 0 ? '' : 'none';
        slider.max = maxSubnetIndex;

        // 2. IP a binario
        let currentBinaryIp = ipToBinaryString(ipStr);
        let networkPart = currentBinaryIp.substring(0, defaultCidr);

        let realSubnetIndex = 0;
        if (sourceEvent === 'slider') {
            realSubnetIndex = parseInt(slider.value, 10);
        } else {
            let realSubnetBits = currentBinaryIp.substring(defaultCidr, cidr);
            realSubnetIndex = borrowedBits > 0 ? (parseInt(realSubnetBits, 2) || 0) : 0;
            slider.value = realSubnetIndex;
        }

        const counter = document.getElementById('subnetCounter');
        // Subred 0 … n-1 (nomenclatura de cátedra)
        if (counter) counter.textContent = 'Subred ' + realSubnetIndex + ' / ' + (numSubnets > 0 ? numSubnets - 1 : 0);

        // 3. Construir parte de subred
        let subnetPart = "";
        if (borrowedBits > 0) {
            subnetPart = realSubnetIndex.toString(2).padStart(borrowedBits, '0');
        }

        // IP de red (bits de host en 0) e IP de broadcast (bits de host en 1)
        const networkBinary   = networkPart + subnetPart + '0'.repeat(hostBits);
        const broadcastBinary = networkPart + subnetPart + '1'.repeat(hostBits);

        const networkIp   = binaryToIp(networkBinary);
        const broadcastIp = binaryToIp(broadcastBinary);

        // Rango de hosts válidos: 2^h − 2 direcciones intermedias
        let rangoText = '—';
        if (hostsPerSubnet > 0) {
            const netNum = parseInt(networkBinary, 2);
            const bcNum  = parseInt(broadcastBinary, 2);
            const firstUsable = binaryToIp((netNum + 1).toString(2).padStart(32, '0'));
            const lastUsable  = binaryToIp((bcNum  - 1).toString(2).padStart(32, '0'));
            rangoText = firstUsable + ' — ' + lastUsable + ` (${hostsPerSubnet} hosts)`;
        } else {
            rangoText = 'Sin hosts utilizables (/30 mínimo recomendado)';
        }

        // Actualizar bloque de resultados
        document.getElementById('ipRed').textContent       = networkIp;
        document.getElementById('ipBroadcast').textContent = broadcastIp;
        document.getElementById('ipRango').textContent     = rangoText;

        // Destacar la fila activa según el toggle
        document.getElementById('rowRed').classList.toggle('active-row', !isBroadcastMode);
        document.getElementById('rowBroadcast').classList.toggle('active-row', isBroadcastMode);

        // Labels del toggle
        const labelRed = document.getElementById('labelRed');
        const labelBc  = document.getElementById('labelBroadcast');
        if (!isBroadcastMode) {
            labelRed.className = 'toggle-label active-red';
            labelBc.className  = 'toggle-label';
        } else {
            labelRed.className = 'toggle-label';
            labelBc.className  = 'toggle-label active-broadcast';
        }

        // 4. Actualizar ipInput solo cuando viene del slider
        if (sourceEvent === 'slider') {
            ipInput.value = networkIp;
        }

        // 5. Renderizar octetos según el modo (red o broadcast)
        const displayBinary = isBroadcastMode ? broadcastBinary : networkBinary;
        renderBits(displayBinary, cidr);
    }

    function renderBits(fullBinary, cidr) {
        const visualizer = document.getElementById('visualizer');
        if (!visualizer) return;
        visualizer.innerHTML = '';

        for (let i = 0; i < 4; i++) {
            const octetBin = fullBinary.substring(i * 8, (i + 1) * 8);
            const octetVal = parseInt(octetBin, 2);

            const octetDiv = document.createElement('div');
            octetDiv.className = 'octet';

            // Área de bits y pesos
            const bitsArea = document.createElement('div');
            bitsArea.className = 'octet-bits-area';

            const title = document.createElement('div');
            title.className = 'octet-title';
            title.textContent = 'Octeto ' + (i + 1);
            bitsArea.appendChild(title);

            const bitsRow = document.createElement('div');
            bitsRow.className = 'bits-row';

            const weightsRow = document.createElement('div');
            weightsRow.className = 'weight-row';

            for (let j = 0; j < 8; j++) {
                const globalIndex = (i * 8) + j;
                const bitVal = octetBin[j];

                const bitDiv = document.createElement('div');
                bitDiv.className = `bit ${globalIndex < cidr ? 'network' : 'host'}`;
                bitDiv.textContent = bitVal;
                bitsRow.appendChild(bitDiv);

                const weightDiv = document.createElement('div');
                weightDiv.className = 'weight';
                weightDiv.textContent = weights[j];
                weightsRow.appendChild(weightDiv);
            }

            bitsArea.appendChild(bitsRow);
            bitsArea.appendChild(weightsRow);
            octetDiv.appendChild(bitsArea);

            // Caja de suma decimal
            const sumBox = document.createElement('div');
            sumBox.className = 'octet-sum';
            const sumLabel = document.createElement('div');
            sumLabel.className = 'octet-sum-label';
            // sumLabel.textContent = 'Suma';
            const sumValue = document.createElement('div');
            sumValue.className = 'octet-sum-value';
            sumValue.textContent = octetVal;
            sumBox.appendChild(sumLabel);
            sumBox.appendChild(sumValue);
            octetDiv.appendChild(sumBox);

            visualizer.appendChild(octetDiv);
        }
    }

    // --- EVENT LISTENERS ---

    document.getElementById('ipInput').addEventListener('input', function () {
        const ipStr = this.value.trim();
        const decEl = document.getElementById('decimalMaskInput');
        const cidrEl = document.getElementById('cidrInput');
        const ipHint = document.getElementById('ipHint');

        if (!ipStr) {
            clearFieldError(this, ipHint);
            return;
        }

        if (!isValidIp(ipStr)) {
            setFieldError(this, ipHint, 'IP inválida. Formato: 0-255.0-255.0-255.0-255');
            return;
        }

        clearFieldError(this, ipHint);

        if (decEl && cidrEl) {
            const def = getDefaultCidr(ipStr);
            if (def) {
                updatingMask = true;
                cidrEl.value = '/' + def;
                decEl.value = cidrToDecimal(def);
                updatingMask = false;
            }
        }
        updateVisualizer('ip');
    });

    const cidrInput = document.getElementById('cidrInput');
    if (cidrInput) {
        cidrInput.addEventListener('input', function() {
            if (updatingMask) return;
            updatingMask = true;
            const rawValue = this.value.replace(/[^0-9]/g, '');
            this.value = rawValue ? '/' + rawValue : '/';

            const decEl = document.getElementById('decimalMaskInput');
            const maskHint = document.getElementById('maskHint');
            let cidrVal = parseInt(rawValue, 10);
            if (!isNaN(cidrVal) && decEl) {
                if (cidrVal > MAX_CIDR) {
                    showToast(`⚠ /${cidrVal} excede el máximo. El máximo posible es /30 (mínimo 2 bits de host). Se ajusta automáticamente.`);
                    cidrVal = MAX_CIDR;
                    this.value = '/' + MAX_CIDR;
                    decEl.value = cidrToDecimal(MAX_CIDR);
                } else if (cidrVal >= 0 && cidrVal <= 32) {
                    decEl.value = cidrToDecimal(cidrVal);
                }
            }
            updatingMask = false;
            updateVisualizer('cidr');
        });

        cidrInput.addEventListener('keydown', function(e) {
            if ((e.key === 'Backspace' || e.key === 'Delete') && this.selectionStart <= 1) {
                e.preventDefault();
                this.setSelectionRange(1, 1);
            }
        });

        cidrInput.addEventListener('focus', function() {
            if (!this.value) {
                this.value = '/';
            }
            if (this.selectionStart < 1) {
                this.setSelectionRange(1, 1);
            }
        });

        cidrInput.addEventListener('click', function() {
            if (this.selectionStart < 1) {
                this.setSelectionRange(1, 1);
            }
        });
    }

    const decInput = document.getElementById('decimalMaskInput');
    if (decInput) {
        decInput.addEventListener('input', function() {
            if (updatingMask) return;

            const raw = this.value.trim();
            const cidrEl = document.getElementById('cidrInput');
            const maskHintEl = document.getElementById('maskHint');

            if (!raw) {
                clearFieldError(this, maskHintEl);
                return;
            }

            // Máscara inválida (bits no contiguos o IP malformada): solo advertir, no calcular
            if (!isValidDecimalMask(raw)) {
                setFieldError(this, maskHintEl, `⚠ "${raw}" no es una máscara válida. Ej: 255.255.255.0`);
                return;
            }

            clearFieldError(this, maskHintEl);

            const cidrVal = decimalToCidr(raw);

            // Máscara válida pero excede /30: autocorregir como hace el CIDR
            if (cidrVal > MAX_CIDR) {
                showToast(`⚠ La máscara "${raw}" equivale a /${cidrVal} y supera el máximo /${MAX_CIDR}. Se ajusta automáticamente.`);
                updatingMask = true;
                this.value = cidrToDecimal(MAX_CIDR);
                cidrEl.value = '/' + MAX_CIDR;
                updatingMask = false;
            } else {
                updatingMask = true;
                cidrEl.value = '/' + cidrVal;
                updatingMask = false;
            }

            updateVisualizer('decimal');
        });
    }

    document.getElementById('subnetSlider').addEventListener('input', function() {
        updateVisualizer('slider');
    });

    document.getElementById('broadcastToggle').addEventListener('change', function() {
        updateVisualizer('toggle');
    });

    window.onload = () => updateVisualizer('init');
</script>
